# Cu / material / THF system
#
# Adapted from the analyzer planner cu_thf_planner.py.
# Sample stack (top to bottom): THF | material | Cu | Ti | Si

name: Cu/material/THF
description: >
  Unknown material film on a Cu/Ti bilayer on a silicon substrate,
  measured in THF solvent.  Determine which THF SLD contrast best
  reveals the material layer's SLD and thickness.

layers:
  - name: THF
    rho: 5.8
    thickness: 0
    interface: 16
    fit:
      interface: [15, 35]

  - name: CuOx
    rho: 5.0
    irho: 0.0
    thickness: 30
    interface: 13
    fit:
      thickness: [10, 70]
      rho: [4.0, 6.0]
      interface: [10, 25]

  - name: Cu
    rho: 6.25
    thickness: 505
    interface: 4.6

  - name: Ti
    rho: -1.2
    thickness: 39.5
    interface: 9.1

  - name: Si
    rho: 2.07

experiment:
  step_interfaces: true
  q_min: 0.008
  q_max: 0.25
  q_points: 60
  dq_over_q: 0.02
  relative_error: 0.05
  data_file: examples/data/REFL_218386_combined_data_auto.txt

optimization:
  param: THF rho
  param_values: [0,1,2,3,4,5,6,7]
  parameters_of_interest: [CuOx rho, CuOx thickness]
  num_realizations: 25
  mcmc_steps: 5000
  entropy_method: kdn

  # Model discrimination: is the CuOx layer real, or just
  # roughness on the Cu surface?
  discrimination_method: bic  # "bic" or "evidence"
  discrimination_mode: penalize # "report" or "penalize"

  alternate_models:
    - name: no_oxide
      # Remove the CuOx layer entirely and allow Cu interface
      # to absorb apparent oxide as roughness.
      modifications:
        - action: remove
          layer: CuOx
        - action: modify
          layer: Cu
          fit:
            thickness: [500, 600]
        - action: modify
          layer: THF
          fit:
            interface: [15, 100]
