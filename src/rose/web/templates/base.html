<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ROSE – {% block title %}Results{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <!-- Plotly.js -->
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" charset="utf-8"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('web.static', filename='style.css') }}" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-layers"></i> ROSE
      </a>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link {% if active_tab == 'optimize' %}active{% endif %}"
             href="{{ url_for('web.optimize_page') }}">
            <i class="bi bi-sliders"></i> Optimize
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_tab == 'plan' %}active{% endif %}"
             href="{{ url_for('web.plan_page') }}">
            <i class="bi bi-pencil-square"></i> Plan
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active_tab == 'results' %}active{% endif %}"
             href="{{ url_for('web.index') }}">
            <i class="bi bi-folder2-open"></i> Results
          </a>
        </li>
      </ul>
      <span class="navbar-text text-secondary small">
        Reflectometry Open Science Engine
      </span>
    </div>
  </nav>

  <!-- Content -->
  <main class="container-fluid py-3 px-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  {% block scripts %}{% endblock %}
</body>
</html>
