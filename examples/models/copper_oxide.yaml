description: >
  Copper thin film on a titanium adhesion layer on silicon substrate, measured in THF with the beam entering from the silicon side. Optimising the THF deuteration ratio to maximise sensitivity to the copper oxide layer parameters.

layers:
  - name: silicon
    rho: 2.074
    thickness: 0
    interface: 0
  - name: titanium
    rho: -1.925
    thickness: 50
    interface: 0
  - name: copper
    rho: 6.554
    thickness: 500
    interface: 0
  - name: copper_oxide
    rho: 3.0
    thickness: 30
    interface: 3
    fit:
      thickness: [10, 50]        # Å
      rho: [0, 8]                # 10⁻⁶ Å⁻²
      interface: [0, 10]         # Å
  - name: thf
    rho: 0.183
    thickness: 0
    interface: 0

experiment:
  q_min: 0.008
  q_max: 0.2
  q_points: 50
  dq_over_q: 0.025
  relative_error: 0.10
  data_file: examples/data/REFL_218386_combined_data_auto.txt

optimization:
  param: "thf rho"
  param_values: [0.183, 1.2786, 2.3742, 3.4698, 4.5654, 5.661]
  parameters_of_interest:
    - "copper_oxide thickness"
    - "copper_oxide interface"
    - "copper_oxide rho"
  num_realizations: 15
  mcmc_steps: 5000
  entropy_method: kdn
