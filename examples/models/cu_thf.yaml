# Cu / material / THF system
#
# Adapted from the analyzer planner cu_thf_planner.py.
# Sample stack (top to bottom): THF | material | Cu | Ti | Si

name: Cu/material/THF

layers:
  - name: THF
    rho: 5.8
    thickness: 0
    interface: 16
    fit:
      interface: [15, 45]

  - name: material
    rho: 5.0
    irho: 0.0
    thickness: 30
    interface: 13
    fit:
      thickness: [10, 70]
      rho: [4.0, 6.0]
      interface: [10, 25]

  - name: Cu
    rho: 6.25
    thickness: 505
    interface: 4.6

  - name: Ti
    rho: -1.2
    thickness: 39.5
    interface: 9.1

  - name: Si
    rho: 2.07

experiment:
  step_interfaces: true
  q_min: 0.008
  q_max: 0.25
  q_points: 60
  dq_over_q: 0.02
  relative_error: 0.05
  data_file: ../data/REFL_218386_combined_data_auto.txt

optimization:
  param: THF rho
  param_values: [1,2,3,4,5,6,7]
  parameters_of_interest: [material rho, material thickness]
  num_realizations: 15
  mcmc_steps: 3000
  entropy_method: kdn
