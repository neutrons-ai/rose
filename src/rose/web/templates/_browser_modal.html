{# Reusable file/folder browser modal – included by optimize.html and plan.html #}
<div class="modal fade" id="browserModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="browser-title">Browse</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="px-3 py-2 bg-light border-bottom d-flex align-items-center">
          <button class="btn btn-sm btn-outline-secondary me-2" id="btn-parent"
                  onclick="browserUp()">
            <i class="bi bi-arrow-up"></i>
          </button>
          <code id="browser-path" class="text-truncate flex-fill"></code>
        </div>
        <div class="list-group list-group-flush" id="browser-list"
             style="max-height:400px;overflow-y:auto">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="btn-select" onclick="browserSelect()"
                style="display:none">
          Select this folder
        </button>
      </div>
    </div>
  </div>
</div>
